services:
  app:
    build:
      context: .
      args:
        NODE_VERSION: 22
    image: ptamp-app
    container_name: ptamp-app
    restart: unless-stopped
    extra_hosts:
      - "db-host:host-gateway"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: "postgresql://vpsdepati:Vpsdepati.123!@db-host:5432/ptamp?schema=public"
    ports:
      - "9001:3000"
